name: grc-gate

# Runs the week 2 policy library against a committed Terraform plan on every
# pull request to main, blocks the ones that break a control, then signs the
# evidence so anyone can prove it is authentic and untouched (week 4).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimal, explicit permissions. contents: read to check out the repo,
# pull-requests: write so the gate can comment its verdict on the PR, and
# id-token: write so Cosign can mint the OIDC token it needs for keyless
# signing -- without it, sign-blob fails.
permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  CONFTEST_VERSION: "0.68.2"
  PLAN_FILE: week-3/plan.json
  POLICY_DIR: week-2/policies

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Conftest to an exact version. Never "latest": a gate must be
      # reproducible, and an upgrade should be a deliberate, reviewable change.
      - name: Install Conftest (pinned)
        run: |
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o conftest.tar.gz
          tar xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      # Run all three control namespaces against the committed plan, but DON'T
      # fail the job here. Capture the verdict and defer the pass/fail decision
      # to the last step, so the signing steps below always run -- a failed run
      # is exactly the evidence we most want signed and preserved. The JSON
      # results are written first, so the evidence exists no matter the verdict.
      - name: Run GRC policy gate
        id: gate
        run: |
          set -o pipefail
          mkdir -p evidence
          set +e
          conftest test \
            --policy "${POLICY_DIR}" \
            --namespace compliance.sc28_aws \
            --namespace compliance.ac3_aws \
            --namespace compliance.cm6_aws \
            --output json \
            "${PLAN_FILE}" | tee evidence/conftest-results.json
          code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"

      # Keyless signing needs the Cosign binary on the runner.
      - name: Install Cosign
        if: always()
        uses: sigstore/cosign-installer@v3.7.0

      # Bundle the evidence into one archive, write its SHA-256 to a sidecar,
      # and sign the archive keyless. The --bundle file packs the signature,
      # the certificate, and the transparency-log entry into one file the
      # verifier reads. This runs even when the gate failed.
      - name: Bundle, hash, and sign evidence
        if: always()
        run: |
          tar -czf evidence.tar.gz -C evidence .
          sha256sum evidence.tar.gz | awk '{print $1}' > evidence.tar.gz.sha256
          cosign sign-blob --yes \
            --bundle evidence.sig.bundle \
            evidence.tar.gz
          ls -l evidence.tar.gz evidence.tar.gz.sha256 evidence.sig.bundle

      # always() so the signed evidence uploads even when the gate fails. The
      # whole point of CI evidence is a durable, verifiable record of the run.
      - name: Upload signed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-gate-evidence
          path: |
            evidence.tar.gz
            evidence.tar.gz.sha256
            evidence.sig.bundle
          if-no-files-found: error

      # The pass/fail decision, last, so the signing steps above always run.
      - name: Enforce gate verdict
        if: always()
        run: |
          code="${{ steps.gate.outputs.exit_code }}"
          if [ "${code}" != "0" ]; then
            echo "GRC gate FAILED: policy violation(s) found (conftest exit ${code})."
            exit 1
          fi
          echo "GRC gate PASSED: no violations."
